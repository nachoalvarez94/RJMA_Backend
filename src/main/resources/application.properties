# Generar un valor seguro: openssl rand -base64 64
app.jwt.secret=${APP_JWT_SECRET:dGhpcy1pcy1hLXNhbXBsZS1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LW5ldmVyLXVzZS1pbi1wcm9kdWN0aW9u}
app.jwt.expiration-ms=86400000